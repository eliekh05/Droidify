name: Publish

on:
  push:
    branches: [main, master]

jobs:
  publish:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/droidify-backend:latest
          platforms: linux/amd64,linux/arm64
          build-args: BUILDTIME=${{ github.run_id }}_${{ github.sha }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nginx/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/droidify-nginx:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=nginx
          cache-to: type=gha,mode=max,scope=nginx

      - name: Docker Scout CVE scan
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ secrets.DOCKERHUB_USERNAME }}/droidify-backend:latest
          only-severities: critical,high
          exit-code: false
          summary: true

      - name: Delete old tags from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"username":"'"$DOCKERHUB_USERNAME"'","password":"'"$DOCKERHUB_TOKEN"'"}' \
            https://hub.docker.com/v2/users/login | jq -r .token)

          for repo in droidify-backend droidify-nginx; do
            TAGS=$(curl -s -H "Authorization: JWT $TOKEN" \
              "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$repo/tags/?page_size=100" \
              | jq -r '.results[].name')
            for tag in $TAGS; do
              if [ "$tag" != "latest" ]; then
                curl -s -X DELETE -H "Authorization: JWT $TOKEN" \
                  "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$repo/tags/$tag/"
              fi
            done
          done
          echo "Cleanup done"
